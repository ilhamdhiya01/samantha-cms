services:
  cms-admin:
    build:
      context: .
      args:
        - VITE_API_URL=http://43.157.223.21:4006
    image: samantha/cms-frontend:latest
    container_name: cms-admin
    restart: unless-stopped
    ports:
      - "5176:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

services:
  backend:
    build: .
    image: samantha-cms-backend:latest
    container_name: samantha-cms-backend
    restart: unless-stopped
    ports:
      - "4006:4006"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4006/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    server_name ilhamdhiyaulhaq.web.id;
    client_max_body_size 25M;

    # Static FE (dist hasil build dari workflow)
    root /home/ubuntu/samantha-cms/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Vite hashed assets — cache 1 tahun
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # API → BE container
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://127.0.0.1:4006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health
    location /health {
        proxy_pass http://127.0.0.1:4006/health;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ilhamdhiyaulhaq.web.id/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ilhamdhiyaulhaq.web.id/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = ilhamdhiyaulhaq.web.id) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name ilhamdhiyaulhaq.web.id;
    return 404; # managed by Certbot


}
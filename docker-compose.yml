services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: samantha-cms-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FE_PORT:-5176}:80"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
    container_name: samantha-cms-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BE_PORT:-4006}:4006"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4006/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

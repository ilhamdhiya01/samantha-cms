services:
  cms-backend-api:
    image: ghcr.io/ilhamdhiya01/samantha-cms-backend:latest
    container_name: cms-backend-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - .env
    volumes:
      - ./cms-backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
